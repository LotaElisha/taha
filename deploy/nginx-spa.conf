# Drop-in nginx config when self-hosting the React SPA instead of Cloudflare Pages.
# Place under /etc/nginx/sites-available/mkulima-spa, then enable + reload.

server {
    listen 80;
    listen [::]:80;
    server_name app.mkulima.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.mkulima.app;

    ssl_certificate     /etc/letsencrypt/live/app.mkulima.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.mkulima.app/privkey.pem;

    root /var/www/mkulima-spa/dist;
    index index.html;

    # Long-cache hashed assets, but always revalidate index.html so deploys are seen instantly.
    location ~* \.(js|css|svg|woff2|png|webp|avif)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must never be cached — otherwise users get stuck on an old SW.
    location = /sw.js {
        add_header Cache-Control "no-store, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: any deep link → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
